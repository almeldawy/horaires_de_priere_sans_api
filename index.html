<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horaires des Prières — Ligue Islamique Mondiale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A96E;
    --gold-light: #E8D5B0;
    --gold-dim: #8B6F3E;
    --dark: #0D0F14;
    --dark-2: #141720;
    --dark-3: #1C2030;
    --dark-4: #242840;
    --text: #F0EDE8;
    --text-dim: #A09880;
    --emerald: #2D6A4F;
    --emerald-light: #52B788;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Geometric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% -10%, rgba(201,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 110%, rgba(45,106,79,0.06) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(201,169,110,0.03) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle grid pattern */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,169,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,169,110,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.8s ease both;
  }

  .arabic-bismillah {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: var(--gold);
    opacity: 0.85;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 20px 0;
  }

  .ornament-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  .ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--text);
    letter-spacing: 0.08em;
    line-height: 1.1;
  }

  h1 span {
    color: var(--gold);
    font-style: italic;
  }

  .subtitle {
    margin-top: 12px;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* SEARCH SECTION */
  .search-section {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 2px;
    padding: 32px;
    margin-bottom: 32px;
    animation: fadeUp 0.8s ease 0.2s both;
    backdrop-filter: blur(8px);
  }

  .search-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .search-wrapper {
    flex: 1;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold-dim);
    font-size: 1rem;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.2);
    color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    padding: 14px 16px 14px 44px;
    outline: none;
    border-radius: 1px;
    transition: border-color 0.3s, background 0.3s;
  }

  input[type="text"]::placeholder { color: var(--text-dim); }

  input[type="text"]:focus {
    border-color: var(--gold);
    background: rgba(201,169,110,0.05);
  }

  /* Autocomplete dropdown */
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--dark-3);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 2px;
    z-index: 100;
    max-height: 200px;
    overflow-y: auto;
    display: none;
  }

  .autocomplete-list.show { display: block; }

  .autocomplete-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    transition: background 0.2s;
    border-bottom: 1px solid rgba(201,169,110,0.08);
  }

  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: rgba(201,169,110,0.1); color: var(--gold-light); }

  .autocomplete-item .city-country {
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .btn {
    background: transparent;
    border: 1px solid rgba(201,169,110,0.4);
    color: var(--gold-light);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0 20px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .btn:hover {
    background: rgba(201,169,110,0.12);
    border-color: var(--gold);
    color: var(--gold);
  }

  .btn-geo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-geo svg { flex-shrink: 0; }

  .btn-search {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 400;
    padding: 14px 24px;
  }

  .btn-search:hover {
    background: var(--gold-light);
    border-color: var(--gold-light);
    color: var(--dark);
  }

  /* Date nav */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid rgba(201,169,110,0.1);
  }

  .btn-nav {
    background: transparent;
    border: 1px solid rgba(201,169,110,0.2);
    color: var(--gold-dim);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.2s;
    font-size: 1rem;
  }

  .btn-nav:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .date-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.06em;
    text-align: center;
    min-width: 200px;
  }

  .date-hijri {
    font-family: 'Amiri', serif;
    font-size: 0.85rem;
    color: var(--gold);
    display: block;
    margin-top: 2px;
  }

  /* LOCATION INFO */
  .location-info {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease both;
  }

  .location-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.06em;
  }

  .location-coords {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* PRAYER CARDS */
  .prayers-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2px;
    animation: fadeUp 0.7s ease 0.1s both;
  }

  .prayer-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 32px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,169,110,0.1);
    border-radius: 1px;
    transition: all 0.3s;
    overflow: hidden;
  }

  .prayer-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.3s;
  }

  .prayer-card.current {
    background: rgba(201,169,110,0.07);
    border-color: rgba(201,169,110,0.35);
  }

  .prayer-card.current::before {
    background: var(--gold);
  }

  .prayer-card:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(201,169,110,0.2);
  }

  .prayer-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .prayer-index {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    width: 20px;
    text-align: right;
  }

  .prayer-icon {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    transition: border-color 0.3s;
  }

  .prayer-card.current .prayer-icon {
    border-color: var(--gold);
    background: rgba(201,169,110,0.1);
  }

  .prayer-names {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .prayer-name-fr {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 300;
  }

  .prayer-name-ar {
    font-family: 'Amiri', serif;
    font-size: 0.95rem;
    color: var(--gold);
    line-height: 1;
  }

  .prayer-right {
    text-align: right;
  }

  .prayer-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .prayer-card.current .prayer-time {
    color: var(--gold-light);
  }

  .prayer-remaining {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .prayer-card.current .prayer-remaining {
    color: var(--gold-dim);
  }

  /* Info method */
  .method-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 28px;
    padding: 14px 24px;
    border: 1px solid rgba(201,169,110,0.12);
    border-radius: 1px;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  .method-dot {
    width: 5px;
    height: 5px;
    background: var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .method-text {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* PLACEHOLDER state */
  .placeholder-state {
    text-align: center;
    padding: 60px 24px;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .placeholder-icon {
    font-size: 3rem;
    margin-bottom: 20px;
    opacity: 0.3;
  }

  .placeholder-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .placeholder-sub {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 8px;
    opacity: 0.6;
    text-transform: uppercase;
  }

  /* Error */
  .error-msg {
    text-align: center;
    padding: 20px;
    border: 1px solid rgba(255, 100, 100, 0.2);
    border-radius: 1px;
    color: #ff9999;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    margin-top: 16px;
    display: none;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    display: none;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 1px solid rgba(201,169,110,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }

  /* Scroll indicator on next prayer */
  .next-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
    font-weight: 400;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .search-row { flex-wrap: wrap; }
    .btn-geo { flex: 1; justify-content: center; }
    .btn-search { flex: 1; }
    .prayer-card { padding: 18px 20px; }
    .prayer-time { font-size: 1.5rem; }
    .prayer-index { display: none; }
  }
</style>
</head>

<div class="container">

  <!-- HEADER -->

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
    <h1>Horaires des <span>Prières</span></h1>

  <!-- SEARCH -->

      <div class="search-wrapper">

      <button class="btn btn-geo" id="geoBtn">

        Géolocaliser
      </button>
      <button class="btn btn-search" id="searchBtn">Chercher</button>
    </div>

    <!-- Date navigation -->
    <div class="date-nav">
      <button class="btn-nav" id="prevDay">◀</button>
      <div class="date-display">
        <span id="dateGreg">—</span>
        <span class="date-hijri" id="dateHijri">—</span>
      </div>
      <button class="btn-nav" id="nextDay">▶</button>
    </div>
  </div>

  <!-- ERROR -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- LOADING -->
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
  </div>

  <!-- RESULTS -->
  <div id="results">

      <div class="placeholder-title">Choisissez une ville</div>
      <div class="placeholder-sub">ou activez la géolocalisation</div>
    </div>
  </div>

</div>

// ============================================================
// PRAYER TIME CALCULATION — MUSLIM WORLD LEAGUE (MWL)
// Fajr angle: 18°  |  Isha angle: 17°
// Asr: Hanafi (shadow = 2x) can be toggled, default Shafi'i (shadow = 1x)
// ============================================================

const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;
const MWL_FAJR_ANGLE = 18.0;
const MWL_ISHA_ANGLE  = 17.0;

function julianDay(Y, M, D) {
  if (M <= 2) { Y--; M += 12; }
  const A = Math.floor(Y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + D + B - 1524.5;
}

function sunPosition(jd) {
  const D = jd - 2451545.0;
  // Mean anomaly
  const g = (357.529 + 0.98560028 * D) % 360;
  // Mean longitude
  const q = (280.459 + 0.98564736 * D) % 360;
  // Ecliptic longitude
  const L = (q + 1.915 * Math.sin(g * DEG) + 0.020 * Math.sin(2 * g * DEG)) % 360;
  // Obliquity of ecliptic
  const e = 23.439 - 0.0000004 * D;
  // Right ascension (hours)
  let RA = Math.atan2(Math.cos(e * DEG) * Math.sin(L * DEG), Math.cos(L * DEG)) * RAD / 15;
  if (RA < 0) RA += 24;
  // Declination
  const decl = Math.asin(Math.sin(e * DEG) * Math.sin(L * DEG)) * RAD;
  // Equation of time (hours)
  const EqT = (q / 15 - RA + 24) % 24;
  return { decl, EqT };
}

function hourAngle(angle, lat, decl) {
  const cosH = (Math.sin(angle * DEG) - Math.sin(lat * DEG) * Math.sin(decl * DEG))
             / (Math.cos(lat * DEG) * Math.cos(decl * DEG));
  if (Math.abs(cosH) > 1) return null; // never rises/sets
  return Math.acos(cosH) * RAD / 15;
}

function asrHourAngle(lat, decl, shadowFactor) {
  // CORRECTION : J'ai supprimé le signe "-" présent juste avant Math.atan.
  // Explication : Cela permet d'obtenir une valeur d'angle positive. 
  // Ainsi, on indique bien au système de chercher le moment où le soleil est à cette hauteur *au-dessus* de l'horizon pour le Asr.
  const angle = Math.atan(1 / (shadowFactor + Math.tan(Math.abs(lat - decl) * DEG))) * RAD;
  
  // On retourne ensuite le résultat à la fonction hourAngle avec la bonne valeur positive
  return hourAngle(angle, lat, decl);
}

function calcPrayerTimes(date, lat, lng, tzOffset) {
  const Y = date.getFullYear();
  const M = date.getMonth() + 1;
  const D = date.getDate();
  const jd = julianDay(Y, M, D);

  const { decl, EqT } = sunPosition(jd);

  // Solar noon (local time)
  const Dhuhr = 12 + tzOffset - lng / 15 - EqT;

  // Sun zenith correction: -0.833° for sunrise/sunset (refraction + disc)
  const sunriseDuration = hourAngle(-0.8333, lat, decl);
  if (sunriseDuration === null) return null;

  const Sunrise = Dhuhr - sunriseDuration;
  const Sunset  = Dhuhr + sunriseDuration;

  // Fajr: 18° below horizon
  const fajrH = hourAngle(-MWL_FAJR_ANGLE, lat, decl);
  const Fajr = fajrH !== null ? Dhuhr - fajrH : null;

  // Asr: Shafi'i (shadow = 1x)
  const asrH = asrHourAngle(lat, decl, 1);
  const Asr = asrH !== null ? Dhuhr + asrH : null;

  // Maghrib = Sunset (standard)
  const Maghrib = Sunset;

  // Isha: 17° below horizon
  const ishaH = hourAngle(-MWL_ISHA_ANGLE, lat, decl);
  const Isha = ishaH !== null ? Dhuhr + ishaH : null;

  return { Fajr, Sunrise, Dhuhr, Asr, Maghrib, Isha };
}

function decimalToTime(decimal) {
  if (decimal === null) return '--:--';
  // Normalize to 0-24
  let h = decimal % 24;
  if (h < 0) h += 24;
  const hours = Math.floor(h);
  const minutes = Math.round((h - hours) * 60);
  if (minutes === 60) return `${String(hours + 1).padStart(2, '0')}:00`;
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
}

// ============================================================
// HIJRI DATE CONVERSION
// ============================================================
function toHijri(date) {
  const Y = date.getFullYear();
  const M = date.getMonth() + 1;
  const D = date.getDate();
  const JD = julianDay(Y, M, D) + 0.5;
  const Z = Math.floor(JD);
  const L = Z - 1948440 + 10632;
  const N = Math.floor((L - 1) / 10631);
  const L2 = L - 10631 * N + 354;
  const J = Math.floor((10985 - L2) / 5316) * Math.floor((50 * L2) / 17719)
          + Math.floor(L2 / 5670) * Math.floor((43 * L2) / 15238);
  const L3 = L2 - Math.floor((30 - J) / 15) * Math.floor((17719 * J) / 50)
           - Math.floor(J / 16) * Math.floor((15238 * J) / 43) + 29;
  const month = Math.floor((24 * L3) / 709);
  const day = L3 - Math.floor((709 * month) / 24);
  const year = 30 * N + J - 30;

  const hijriMonths = [
    'Muharram','Safar','Rabi al-Awwal','Rabi al-Thani',
    'Jumada al-Ula','Jumada al-Akhira','Rajab','Sha\'ban',
    'Ramadan','Shawwal','Dhul Qi\'dah','Dhul Hijjah'
  ];
  return `${day} ${hijriMonths[month - 1]} ${year} H`;
}

let currentDate = new Date();

function showError(msg) {
  errorMsg.textContent = msg;

}

function showLoading(show) {

}

function updateDateDisplay() {
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  dateGreg.textContent = currentDate.toLocaleDateString('fr-FR', options);
  dateHijri.textContent = toHijri(currentDate);

updateDateDisplay();

// ============================================================
// RENDER PRAYERS
// ============================================================
const PRAYERS = [
  { key: 'Fajr',    nameFr: 'Fajr',    nameAr: 'الفجر',   icon: '🌙' },
  { key: 'Sunrise', nameFr: 'Chourouk', nameAr: 'الشروق',  icon: '🌅' },
  { key: 'Dhuhr',   nameFr: 'Dhuhr',   nameAr: 'الظهر',   icon: '☀️' },
  { key: 'Asr',     nameFr: 'Asr',     nameAr: 'العصر',   icon: '🌤️' },
  { key: 'Maghrib', nameFr: 'Maghrib', nameAr: 'المغرب',  icon: '🌆' },
  { key: 'Isha',    nameFr: 'Isha',    nameAr: 'العشاء',  icon: '🌃' },
];

function timeStringToMinutes(ts) {
  if (ts === '--:--') return -1;
  const [h, m] = ts.split(':').map(Number);
  return h * 60 + m;
}

function renderPrayers(times, locName, lat, lng) {
  if (timerInterval) clearInterval(timerInterval);

  function getHTML() {
    const now = new Date();
    const isToday = (
      currentDate.getFullYear() === now.getFullYear() &&
      currentDate.getMonth() === now.getMonth() &&
      currentDate.getDate() === now.getDate()
    );
    const nowMinutes = now.getHours() * 60 + now.getMinutes();

    // Find next prayer
    const prayerTimes = PRAYERS.map(p => ({
      ...p,
      timeStr: decimalToTime(times[p.key]),
      minutes: timeStringToMinutes(decimalToTime(times[p.key]))
    }));

    // Current/next prayer for today
    let currentIdx = -1;
    let nextIdx = -1;
    if (isToday) {
      for (let i = prayerTimes.length - 1; i >= 0; i--) {
        if (prayerTimes[i].minutes !== -1 && nowMinutes >= prayerTimes[i].minutes) {
          currentIdx = i;
          break;
        }
      }
      // Next prayer
      for (let i = 0; i < prayerTimes.length; i++) {
        if (prayerTimes[i].minutes !== -1 && prayerTimes[i].minutes > nowMinutes) {
          nextIdx = i;
          break;
        }
      }
    }

    function getRemainingText(idx) {
      if (!isToday || idx < 0) return '';
      const pt = prayerTimes[idx];
      if (pt.minutes === -1) return '';
      const diff = pt.minutes - nowMinutes;
      if (diff <= 0) return 'En cours';
      const h = Math.floor(diff / 60);
      const m = diff % 60;
      if (h === 0) return `dans ${m} min`;
      return `dans ${h}h${String(m).padStart(2,'0')}`;
    }

    const cards = prayerTimes.map((p, i) => {
      const isCurrent = isToday && i === currentIdx;
      const isNext = isToday && i === nextIdx;
      const remaining = isNext ? getRemainingText(nextIdx) : (isCurrent ? 'En cours' : '');
      const nextBadge = isNext ? `<span class="next-badge">Suivante</span>` : '';
      return `
        <div class="prayer-card ${isCurrent ? 'current' : ''}">
          <div class="prayer-left">
            <div class="prayer-index">0${i+1}</div>
            <div class="prayer-icon">${p.icon}</div>
            <div class="prayer-names">
              <div class="prayer-name-fr">${p.nameFr}${nextBadge}</div>
              <div class="prayer-name-ar">${p.nameAr}</div>
            </div>
          </div>
          <div class="prayer-right">
            <div class="prayer-time">${p.timeStr}</div>
            ${remaining ? `<div class="prayer-remaining">${remaining}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    const coordStr = `${Math.abs(lat).toFixed(4)}° ${lat >= 0 ? 'N' : 'S'}, ${Math.abs(lng).toFixed(4)}° ${lng >= 0 ? 'E' : 'O'}`;

    return `
      <div class="location-info">
        <div class="location-name">${locName}</div>
        <div class="location-coords">${coordStr}</div>
      </div>
      <div class="prayers-grid">${cards}</div>
      <div class="method-badge">
        <div class="method-dot"></div>
        <div class="method-text">Méthode · Ligue Islamique Mondiale · Fajr 18° · Isha 17° · Asr Shafi'i</div>
        <div class="method-dot"></div>
      </div>`;
  }

  results.innerHTML = getHTML();

  // Update every minute
  timerInterval = setInterval(() => {
    results.innerHTML = getHTML();
  }, 30000);
}

function compute(lat, lng, tzOffset, locName) {
  const times = calcPrayerTimes(currentDate, lat, lng, tzOffset);
  if (!times) {
    showError('Impossible de calculer les horaires pour cette localisation.');
    return;
  }
  renderPrayers(times, locName, lat, lng);
}

// ============================================================
// TIMEZONE DETECTION
// ============================================================
function getTimezoneOffset(lng) {
  // Rough estimate from longitude
  return Math.round(lng / 15 * 2) / 2;
}

// ============================================================
// AUTOCOMPLETE
// ============================================================
function filterCities(query) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  return CITIES.filter(c => {
    const name = c.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const country = c.country.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    return name.startsWith(q) || country.startsWith(q);
  }).slice(0, 8);
}

cityInput.addEventListener('input', () => {
  const matches = filterCities(cityInput.value);
  if (matches.length === 0) {
    autocomplete.classList.remove('show');
    return;
  }
  autocomplete.innerHTML = matches.map(c => `
    <div class="autocomplete-item" data-name="${c.name}" data-country="${c.country}" data-lat="${c.lat}" data-lng="${c.lng}" data-tz="${c.tz}">
      <div>${c.name}</div>
      <div class="city-country">${c.country}</div>
    </div>`).join('');
  autocomplete.classList.add('show');
});

autocomplete.addEventListener('click', (e) => {
  const item = e.target.closest('.autocomplete-item');
  if (!item) return;
  const { name, country, lat, lng, tz } = item.dataset;
  cityInput.value = name;
  autocomplete.classList.remove('show');
  currentLocation = { name: `${name}, ${country}`, lat: +lat, lng: +lng, tz: +tz };
  compute(+lat, +lng, +tz, `${name}, ${country}`);
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrapper')) {
    autocomplete.classList.remove('show');
  }
});

cityInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') searchBtn.click();
});

// ============================================================
// SEARCH BUTTON
// ============================================================
searchBtn.addEventListener('click', () => {
  const q = cityInput.value.trim();
  if (!q) { showError('Veuillez saisir le nom d\'une ville.'); return; }
  const matches = filterCities(q);
  if (matches.length === 0) {
    showError('Ville non trouvée. Essayez une autre orthographe ou choisissez dans la liste.');
    return;
  }
  const c = matches[0];
  currentLocation = { name: `${c.name}, ${c.country}`, lat: c.lat, lng: c.lng, tz: c.tz };
  cityInput.value = c.name;
  autocomplete.classList.remove('show');
  compute(c.lat, c.lng, c.tz, `${c.name}, ${c.country}`);
});

// ============================================================
// GEOLOCATION
// ============================================================
geoBtn.addEventListener('click', () => {
  if (!navigator.geolocation) {
    showError('La géolocalisation n\'est pas supportée par votre navigateur.');
    return;
  }
  showLoading(true);
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;

      // Try to get city name via reverse geocoding (no API key needed for nominatim)
      let locName = `${lat.toFixed(4)}° N, ${Math.abs(lng).toFixed(4)}°`;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=fr`);
        const data = await res.json();
        const city = data.address?.city || data.address?.town || data.address?.village || data.address?.municipality || '';
        const country = data.address?.country || '';
        if (city) locName = country ? `${city}, ${country}` : city;
      } catch(e) {
        // Fallback: find nearest city in our database
        let minDist = Infinity;
        CITIES.forEach(c => {
          const d = Math.sqrt((c.lat - lat)**2 + (c.lng - lng)**2);
          if (d < minDist) { minDist = d; locName = `${c.name}, ${c.country}`; }
        });
      }

      showLoading(false);
      // Get real UTC offset
      const tz = -new Date().getTimezoneOffset() / 60;
      currentLocation = { name: locName, lat, lng, tz };
      cityInput.value = '';
      compute(lat, lng, tz, locName);
    },
    (err) => {
      showLoading(false);
      showError('Impossible d\'obtenir votre position. Vérifiez les permissions du navigateur.');
    },
    { timeout: 10000, maximumAge: 60000 }
  );
});

// ============================================================
// DATE NAVIGATION
// ============================================================
prevDay.addEventListener('click', () => {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() - 1);
  updateDateDisplay();
  if (currentLocation) {
    compute(currentLocation.lat, currentLocation.lng, currentLocation.tz, currentLocation.name);
  }
});

nextDay.addEventListener('click', () => {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + 1);
  updateDateDisplay();
  if (currentLocation) {
    compute(currentLocation.lat, currentLocation.lng, currentLocation.tz, currentLocation.name);
  }
});
